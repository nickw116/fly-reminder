name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm 飞机提醒.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlyReminder-exe
          path: dist/飞机提醒.exe

      - name: E2E test - process lifecycle
        shell: python
        run: |
          import subprocess, sys, time, io, os
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')

          exe = os.path.join("dist", "\u98de\u673a\u63d0\u9192.exe")
          print(f"[e2e] launching {exe}")

          # Launch with CREATE_NO_WINDOW to avoid console pop-up
          proc = subprocess.Popen([exe], creationflags=0x08000000)
          time.sleep(6)

          # Step 1: Process should be alive
          if proc.poll() is not None:
              print(f"[e2e] FAIL: process exited with code {proc.returncode}")
              sys.exit(1)
          print("[e2e] step 1 OK: process running")

          # Step 2: Send WM_CLOSE via taskkill (simulates user clicking X)
          # On CI (no interactive desktop), tkinter may not create a visible window,
          # but WM_CLOSE via the process window should still work.
          import ctypes
          hwnd = ctypes.windll.user32.FindWindowW(None, "\u98de\u673a\u63d0\u9192")
          print(f"[e2e] FindWindow hwnd={hwnd}")

          if hwnd != 0:
              # Interactive desktop available - test tray minimize
              WM_CLOSE = 0x0010
              ctypes.windll.user32.SendMessageW(hwnd, WM_CLOSE, 0, 0)
              time.sleep(3)

              if proc.poll() is not None:
                  print(f"[e2e] FAIL: process exited after WM_CLOSE (tray failed) code={proc.returncode}")
                  sys.exit(1)
              print("[e2e] step 2 OK: process survived WM_CLOSE -> tray working")

              # Force quit via tray menu simulation
              ctypes.windll.user32.PostMessageW(hwnd, WM_CLOSE, 0, 0)
              time.sleep(2)
          else:
              print("[e2e] step 2 SKIP: no interactive desktop (CI headless)")

          # Cleanup
          proc.terminate()
          try:
              proc.wait(timeout=5)
          except subprocess.TimeoutExpired:
              proc.kill()
          print("[e2e] cleanup done")

      - name: E2E test - Python import check
        shell: python
        run: |
          import sys, io
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')

          # Verify core module imports and structure
          import importlib.util
          spec = importlib.util.spec_from_file_location("fly_reminder", "fly_reminder.py")
          mod = importlib.util.module_from_spec(spec)

          # We can't fully import it (tkinter needs display), but we can check:
          # - Syntax is valid (module loads without SyntaxError)
          # - Version is set correctly
          try:
              with open("fly_reminder.py", "r", encoding="utf-8") as f:
                  source = f.read()
              compile(source, "fly_reminder.py", "exec")
              print("[e2e-import] OK: syntax valid")
          except SyntaxError as e:
              print(f"[e2e-import] FAIL: syntax error: {e}")
              sys.exit(1)

          # Check NOTIFYICONDATA structure has uTimeout field
          if '"uTimeout"' not in source:
              print("[e2e-import] FAIL: uTimeout field missing from NOTIFYICONDATA")
              sys.exit(1)
          print("[e2e-import] OK: uTimeout field present")

          # Check _MEIPASS icon path
          if "_MEIPASS" in source:
              print("[e2e-import] OK: _MEIPASS icon loading present")
          else:
              print("[e2e-import] FAIL: _MEIPASS icon loading missing")
              sys.exit(1)

          print("[e2e-import] PASSED")
