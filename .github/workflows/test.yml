name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm 飞机提醒.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlyReminder-exe
          path: dist/飞机提醒.exe

      - name: End-to-end test - launch and tray
        shell: python
        run: |
          import subprocess, sys, time, ctypes, os, io
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')

          exe = r"dist\飞机提醒.exe"
          print(f"[e2e] launching {exe}")
          proc = subprocess.Popen([exe])
          time.sleep(5)

          if proc.poll() is not None:
              print(f"[e2e] FAIL: process exited with code {proc.returncode}")
              sys.exit(1)
          print("[e2e] process is running, OK")

          hwnd = ctypes.windll.user32.FindWindowW(None, "\u98de\u673a\u63d0\u9192")
          print(f"[e2e] FindWindow hwnd={hwnd}")
          assert hwnd != 0, "Window not found"

          WM_CLOSE = 0x0010
          ctypes.windll.user32.SendMessageW(hwnd, WM_CLOSE, 0, 0)
          time.sleep(2)

          if proc.poll() is not None:
              print(f"[e2e] FAIL: process exited after WM_CLOSE with code {proc.returncode}")
              sys.exit(1)
          print("[e2e] process survived WM_CLOSE (tray minimize), OK")

          time.sleep(1)

          proc.terminate()
          try:
              proc.wait(timeout=5)
          except subprocess.TimeoutExpired:
              proc.kill()
          print("[e2e] cleanup done")

      - name: End-to-end test - reminder fire
        shell: python
        run: |
          import subprocess, sys, time, ctypes, io
          sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace')

          exe = r"dist\飞机提醒.exe"
          proc = subprocess.Popen([exe])
          time.sleep(4)

          if proc.poll() is not None:
              print(f"[e2e-remind] FAIL: process exited early with {proc.returncode}")
              sys.exit(1)

          hwnd = ctypes.windll.user32.FindWindowW(None, "\u98de\u673a\u63d0\u9192")
          print(f"[e2e-remind] hwnd={hwnd}")
          assert hwnd != 0, "Window not found for reminder test"

          SW_RESTORE = 9
          ctypes.windll.user32.ShowWindow(hwnd, SW_RESTORE)
          time.sleep(0.5)

          fg = ctypes.windll.user32.GetForegroundWindow()
          print(f"[e2e-remind] foreground hwnd={fg}, our hwnd={hwnd}")

          proc.terminate()
          try:
              proc.wait(timeout=5)
          except subprocess.TimeoutExpired:
              proc.kill()
          print("[e2e-remind] PASSED")
